name: Daily Automated Commit

on:
  schedule:
    - cron: '30 2 * * *'   # Runs every day at 2:30 AM UTC
  workflow_dispatch:         # Also allows manual triggering

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit update for 23f1000096@ds.study.iitm.ac.in
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Daily update: $(date)" >> activity-log.txt
          git add activity-log.txt
          git commit -m "chore: daily automated commit $(date '+%Y-%m-%d %H:%M:%S')"
          git push
